<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #36393f;
            color: #dcddde;
            overflow: hidden;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2f3136; }
        ::-webkit-scrollbar-thumb { background: #202225; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #18191c; }

        /* Animation d'apparition des messages */
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .chat-bubble {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Bulle d'autres utilisateurs */
        .other-user-bubble {
            background-color: #2f3136;
            color: #dcddde;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        /* Bulle de l'utilisateur (Les "ok") */
        .my-bubble {
            background-color: #5865F2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .disabled-btn {
            filter: grayscale(100%);
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row text-sm">

    <main class="flex-1 flex flex-col h-full bg-[#36393f] relative border-r border-[#202225]">
        <!-- En-tête du chat -->
        <header class="h-12 border-b border-[#202225] flex items-center px-4 shadow-sm z-10 shrink-0">
            <i class="fa-solid fa-hashtag text-gray-400 mr-2"></i>
            <h1 class="font-bold text-white text-base">OK Clicker</h1>
            <span class="ml-4 text-xs text-gray-400 border-l border-gray-600 pl-4 hidden sm:block">
                Car on s'en branle de ce qu'ils disent ces tâches
            </span>
        </header>

        <!-- Zone des messages -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4">
            <div class="text-center text-gray-500 text-xs my-4">
                Début de la conversation
            </div>
        </div>

        <div class="p-4 bg-[#36393f] shrink-0 border-t border-[#202225]">
            <div class="flex justify-between items-end mb-2">
                <div class="text-xs text-gray-400 font-semibold uppercase tracking-wide">
                    Messages à valider : <span id="pending-display" class="text-white font-bold text-sm bg-[#202225] px-2 py-0.5 rounded">1</span>
                </div>
                <button id="btn-ping" class="text-xs bg-[#4f545c] hover:bg-[#5d6269] text-white px-3 py-1 rounded transition flex items-center gap-1 transform active:scale-95">
                    <i class="fa-solid fa-bell"></i> Ping le groupe
                </button>
            </div>
            
            <div id="input-container" class="bg-[#40444b] rounded-lg p-2 flex items-center shadow-inner transition-opacity duration-200">
                <div class="flex-1 px-3 text-gray-400 select-none bg-transparent outline-none">
                    ok
                </div>
                <button id="btn-send" class="bg-[#5865F2] hover:bg-[#4752C4] text-white rounded px-6 py-2 transition-colors duration-200 font-semibold flex items-center gap-2 transform active:scale-95">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>Envoyer</span>
                </button>
            </div>
            <div class="text-center mt-2 text-xs text-gray-500">
                Il faut qu'il y ait des messages en attente pour envoyer 'ok'.
            </div>
        </div>
    </main>

    <aside class="w-full md:w-80 lg:w-96 bg-[#2f3136] h-full flex flex-col shrink-0 overflow-y-auto">
        <!-- Tableau des scores -->
        <div class="p-6 bg-[#202225] border-b border-[#18191c] shadow-md z-10 sticky top-0">
            <h2 class="text-xs uppercase font-bold text-gray-400 mb-2 tracking-wider">Statistiques du Spam</h2>
            <div class="text-3xl font-bold text-white mb-1 flex items-baseline gap-2">
                <span id="score-display">0</span>
                <span class="text-sm font-normal text-gray-400">ok générés</span>
            </div>
            <div class="text-sm text-[#43b581] font-semibold flex items-center gap-1">
                <i class="fa-solid fa-arrow-trend-up"></i>
                <span id="cps-display">0</span> ok / seconde
            </div>
            <div class="text-sm text-[#eb459e] font-semibold flex items-center gap-1 mt-1">
                <i class="fa-solid fa-comment-dots"></i>
                <span id="msg-ps-display">0</span> msg entrants / sec
            </div>
        </div>

        <!-- Liste des producteurs -->
        <div class="p-4 flex-1">
            <h2 class="text-xs uppercase font-bold text-gray-400 mb-4 tracking-wider">Boutique de l'Automatisation</h2>
            <div id="shop-container" class="space-y-3">
                <!-- Généré par JS -->
            </div>
        </div>
    </aside>

    <script>
        // État du jeu
        let gameState = {
            oks: 0,
            oksPerSecond: 0,
            incomingPerSecond: 0,
            pendingMessages: 1, // 1 message au lancement pour commencer
            clickPower: 1,
            totalClicks: 0
        };

        // Données pour le faux tchat
        const friendNames = ["Omeins!!", "LeCDrom", "DIABLOZZ", "_Tiger__", "⥊𝙎𝙞𝙘𝙠𝙋𝙖𝙏𝙖𝙏𝙚⥋", "Lurnot3k", "Mr S", "];
        const chatMessages = [
            "eh vous faites quoi ce soir ?", "j'ai faim", "qui pour une game ?", "regardez cette vidéo mdr",
            "je suis fatigué", "quelqu'un a compris le cours ?", "il pleut chez vous ?", "j'ai raté mon bus",
            "vous avez vu le dernier épisode ?", "mon pc bug", "je lag", "brb", "re", "mdrrrr",
            "qui est chaud ?", "venez vocal", "je vais manger", "a+", "bonne nuit", "yo",
            "c'est quand les vacs ?", "j'ai plus de batterie", "regardez mon chat", "j'ai eu une bonne note",
            "je suis en retard", "vous faites quoi ?", "qui joue ?", "je lance le jeu", "attendez moi",
            "je dois déco", "j'ai trop mangé", "quelqu'un a un chargeur ?", "c'est abusé", "dinguerie",
            "je suis mort", "jPP", "bref", "du coup on fait quoi ?", "je m'ennuie", "vous êtes morts ?",
            "allo ?", "quelqu'un est là ?", "répondez wesh", "je parle dans le vide", "j'ai acheté un truc",
            "regardez ça", "c'est quoi ce bordel", "je comprends rien", "aidez moi", "j'arrive",
            "arrête avec tes OK", "t'es lourd", "on va le ban ce mec", "sinon vous en pensez quoi de la maj ?"
        ];

        // Définition des bâtiments (mix de type OK et MSG)
        const producers = [
            { id: 'ctrlv', type: 'ok', name: 'Copier-Coller (Ctrl+V)', desc: 'Gagne du temps.', baseCost: 15, baseProd: 0.5, count: 0, icon: 'fa-clipboard', color: 'text-gray-300' },
            { id: 'pote1', type: 'msg', name: 'Pote qui s\'ennuie', desc: 'Envoie des messages pour rien dire.', baseCost: 20, baseProd: 0.5, count: 0, icon: 'fa-user', color: 'text-blue-300' },
            { id: 'macro', type: 'ok', name: 'Macro Clavier', desc: 'Spam automatique.', baseCost: 100, baseProd: 4, count: 0, icon: 'fa-keyboard', color: 'text-blue-400' },
            { id: 'drama', type: 'msg', name: 'Lancer un drama', desc: 'Avalanche de messages garantie.', baseCost: 150, baseProd: 5, count: 0, icon: 'fa-fire', color: 'text-orange-400' },
            { id: 'brother', type: 'ok', name: 'Le Petit Frère', desc: 'Soudoyé pour cliquer.', baseCost: 1100, baseProd: 12, count: 0, icon: 'fa-child', color: 'text-yellow-400' },
            { id: 'leak', type: 'msg', name: 'Leak de jeu vidéo', desc: 'Le serveur s\'enflamme de discussions.', baseCost: 1500, baseProd: 15, count: 0, icon: 'fa-gamepad', color: 'text-purple-500' },
            { id: 'bot', type: 'ok', name: 'Bot Auto-Répondeur', desc: 'Script Python de validation.', baseCost: 12000, baseProd: 60, count: 0, icon: 'fa-robot', color: 'text-green-400' },
            { id: 'hack', type: 'msg', name: 'Ping @everyone', desc: 'Réveille absolument tout le monde.', baseCost: 15000, baseProd: 80, count: 0, icon: 'fa-bell', color: 'text-red-500' },
            { id: 'raid', type: 'ok', name: 'Raid Multi-Comptes', desc: 'Synchronisation d\'alts.', baseCost: 130000, baseProd: 400, count: 0, icon: 'fa-users', color: 'text-red-400' },
            { id: 'bot_raid', type: 'msg', name: 'Raid de Bots Spammeurs', desc: 'Faux comptes inondant le chat.', baseCost: 150000, baseProd: 500, count: 0, icon: 'fa-biohazard', color: 'text-pink-500' },
            { id: 'ai', type: 'ok', name: 'IA Générative', desc: 'Réseau de neurones approbateur.', baseCost: 1500000, baseProd: 5000, count: 0, icon: 'fa-brain', color: 'text-purple-400' }
        ];

        const elScore = document.getElementById('score-display');
        const elCps = document.getElementById('cps-display');
        const elMsgPs = document.getElementById('msg-ps-display');
        const elPending = document.getElementById('pending-display');
        const btnSend = document.getElementById('btn-send');
        const inputContainer = document.getElementById('input-container');
        const shopContainer = document.getElementById('shop-container');
        const chatContainer = document.getElementById('chat-container');

        // Effet sonore d'envoi de message
        const sendSound = new Audio('discord-send.mp3');
        sendSound.volume = 0.5;

        function formatNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        function getCost(producer) {
            return Math.floor(producer.baseCost * Math.pow(1.15, producer.count));
        }

        function updateCPS() {
            let cps = 0;
            let msgPs = 0;
            producers.forEach(p => {
                if(p.type === 'ok') cps += p.count * p.baseProd;
                if(p.type === 'msg') msgPs += p.count * p.baseProd;
            });
            gameState.oksPerSecond = cps;
            gameState.incomingPerSecond = msgPs;
            elCps.innerText = (Math.round(cps * 10) / 10).toLocaleString('fr-FR');
            elMsgPs.innerText = (Math.round(msgPs * 10) / 10).toLocaleString('fr-FR');
        }

        function updateDisplay() {
            elScore.innerText = formatNumber(gameState.oks);
            elPending.innerText = Math.floor(gameState.pendingMessages).toLocaleString('fr-FR');
            
            // Verrouiller/Déverrouiller le bouton envoyer
            if (gameState.pendingMessages >= 1) {
                btnSend.classList.remove('disabled-btn');
                inputContainer.classList.remove('opacity-50');
            } else {
                btnSend.classList.add('disabled-btn');
                inputContainer.classList.add('opacity-50');
            }
            
            // Mettre à jour la boutique
            producers.forEach(p => {
                const btn = document.getElementById(`btn-buy-${p.id}`);
                if(btn) {
                    const cost = getCost(p);
                    if (gameState.oks >= cost) {
                        btn.classList.remove('disabled-btn');
                        btn.classList.replace('bg-[#202225]', 'bg-[#40444b]');
                        btn.classList.add('hover:bg-[#4f545c]');
                    } else {
                        btn.classList.add('disabled-btn');
                        btn.classList.replace('bg-[#40444b]', 'bg-[#202225]');
                        btn.classList.remove('hover:bg-[#4f545c]');
                    }
                    document.getElementById(`cost-${p.id}`).innerText = formatNumber(cost);
                    document.getElementById(`count-${p.id}`).innerText = p.count;
                }
            });
        }

        function renderShop() {
            shopContainer.innerHTML = '';
            producers.forEach(p => {
                const cost = getCost(p);
                const btn = document.createElement('div');
                btn.id = `btn-buy-${p.id}`;
                btn.className = `flex items-center justify-between p-3 rounded-lg cursor-pointer transition bg-[#202225] select-none shadow-sm`;
                btn.onclick = () => buyProducer(p.id);
                
                const badge = p.type === 'ok' 
                    ? `<span class="text-[9px] font-bold bg-[#5865F2] text-white px-1.5 py-0.5 rounded">OK</span>`
                    : `<span class="text-[9px] font-bold bg-[#eb459e] text-white px-1.5 py-0.5 rounded">MSG</span>`;

                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-[#2f3136] flex items-center justify-center text-xl shadow-inner border border-[#18191c]">
                            <i class="fa-solid ${p.icon} ${p.color}"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-200 text-sm">${p.name}</h3>
                            <div class="text-xs flex items-center gap-1 mt-1">
                                ${badge}
                                <span id="cost-${p.id}" class="text-white font-bold ml-1">${formatNumber(cost)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div id="count-${p.id}" class="text-2xl font-black text-gray-500 opacity-50">${p.count}</div>
                        <div class="text-[10px] text-gray-500 uppercase">+${p.baseProd}/s</div>
                    </div>
                `;
                shopContainer.appendChild(btn);
            });
            updateDisplay();
        }

        function buyProducer(id) {
            const producer = producers.find(p => p.id === id);
            const cost = getCost(producer);
            
            if (gameState.oks >= cost) {
                gameState.oks -= cost;
                producer.count++;
                updateCPS();
                updateDisplay();
                
                const btn = document.getElementById(`btn-buy-${id}`);
                if(btn) {
                    btn.style.transform = 'scale(0.97)';
                    setTimeout(() => btn.style.transform = 'scale(1)', 100);
                }
            }
        }

        let messageCount = 0;
        const MAX_MESSAGES_IN_DOM = 30;

        function addChatMessage(isManual = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-bubble p-3 rounded-xl shadow-sm text-sm flex flex-col space-y-1 my-bubble`;
            
            let text = "ok";
            if(Math.random() > 0.99) text = "OK";
            if(Math.random() > 0.999) text = "ok.";
            
            msgDiv.innerHTML = `<span>${text}</span>`;
            chatContainer.appendChild(msgDiv);
            messageCount++;

            // Audio superposé
            const soundClone = sendSound.cloneNode();
            soundClone.volume = 0.5;
            soundClone.play().catch(() => {});

            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (messageCount > MAX_MESSAGES_IN_DOM) {
                if (chatContainer.children.length > 2) { 
                    chatContainer.removeChild(chatContainer.children[1]);
                    messageCount--;
                }
            }
        }

        function addIncomingMessage(playAudio = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-bubble p-3 rounded-xl shadow-sm text-sm flex flex-col space-y-1 other-user-bubble max-w-[80%] mt-2`;
            
            const randomMsg = chatMessages[Math.floor(Math.random() * chatMessages.length)];
            const randomName = friendNames[Math.floor(Math.random() * friendNames.length)];
            const colors = ['#eb459e', '#5865F2', '#43b581', '#faa61a', '#f04747'];
            const nameColor = colors[Math.floor(Math.random() * colors.length)];
            
            msgDiv.innerHTML = `
                <span class="text-xs font-bold mb-1" style="color: ${nameColor}">${randomName}</span>
                <span>${randomMsg}</span>
            `;
            
            chatContainer.appendChild(msgDiv);
            messageCount++;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (playAudio) {
                const soundClone = sendSound.cloneNode();
                soundClone.volume = 0.5;
                soundClone.play().catch(() => {});
            }

            if (messageCount > MAX_MESSAGES_IN_DOM) {
                if (chatContainer.children.length > 2) {
                    chatContainer.removeChild(chatContainer.children[1]);
                    messageCount--;
                }
            }
        }

        function clickOk() {
            if (gameState.pendingMessages >= 1) {
                gameState.pendingMessages -= 1;
                gameState.oks += gameState.clickPower;
                gameState.totalClicks++;
                addChatMessage(true);
                updateDisplay();
            }
        }

        // Listeners boutons
        document.getElementById('btn-ping').addEventListener('click', () => {
            gameState.pendingMessages += 1;
            addIncomingMessage(true);
            updateDisplay();
            const btnPing = document.getElementById('btn-ping');
            btnPing.classList.add('scale-95');
            setTimeout(() => btnPing.classList.remove('scale-95'), 100);
        });

        btnSend.addEventListener('click', clickOk);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if(gameState.pendingMessages >= 1) {
                    clickOk();
                    btnSend.classList.add('bg-[#4752C4]', 'scale-95');
                    setTimeout(() => btnSend.classList.remove('bg-[#4752C4]', 'scale-95'), 100);
                }
            }
        });

        // Boucle de jeu
        let visualChatAccumulator = 0;
        let incomingAccumulator = 0;
        
        setInterval(() => {
            // 1. Messages entrants auto
            if (gameState.incomingPerSecond > 0) {
                incomingAccumulator += gameState.incomingPerSecond / 10;
                if (incomingAccumulator >= 1) {
                    let msgsToGenerate = Math.floor(incomingAccumulator);
                    gameState.pendingMessages += msgsToGenerate;
                    
                    let visualCount = Math.min(msgsToGenerate, 3); 
                    for(let i=0; i < visualCount; i++) addIncomingMessage(true);
                    
                    incomingAccumulator -= msgsToGenerate;
                    updateDisplay();
                }
            }

            // 2. OK automatiques (limités par les messages en attente)
            if (gameState.oksPerSecond > 0 && gameState.pendingMessages > 0) {
                let possibleOks = gameState.oksPerSecond / 10;
                let actualOks = Math.min(possibleOks, gameState.pendingMessages);
                
                gameState.oks += actualOks;
                gameState.pendingMessages -= actualOks;
                visualChatAccumulator += actualOks;
                
                if (visualChatAccumulator >= 1) {
                    let msgsToGenerate = Math.floor(visualChatAccumulator);
                    let visualCount = Math.min(msgsToGenerate, 3);
                    
                    for(let i=0; i < visualCount; i++) addChatMessage(false);
                    visualChatAccumulator -= msgsToGenerate;
                }
                updateDisplay();
            }
        }, 100);

        // Lancement
        renderShop();
        addIncomingMessage(false); // Premier message silencieux
    </script>
</body>
</html>
